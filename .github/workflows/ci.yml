name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Use a dummy key for build-time check (API is never called at build time)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'build-time-placeholder' }}

      - name: Run tests
        run: npm test --if-present
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'build-time-placeholder' }}
