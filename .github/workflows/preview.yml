name: Preview Deploy

on:
  pull_request:
    branches: [main]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Preview)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deploy\n\n✅ **Preview URL:** ${{ steps.deploy.outputs.preview-url }}\n\nTest the \`/api/analyze\` endpoint with:\n\`\`\`bash\ncurl -X POST ${{ steps.deploy.outputs.preview-url }}/api/analyze \\\n  -H "Content-Type: application/json" \\\n  -d '{"inputType":"text","data":"Lønn: 50000 NOK. Strøm: 2500 NOK/måned. Netflix: 189 NOK/måned."}'\n\`\`\``
            })
